<!DOCTYPE html>
<html lang="zh">
<head><meta charset="UTF-8"><title>学员端 - 课表</title><link rel="stylesheet" href="style.css"></head>
<body>
<div>
<div class="phone">
  <div class="header">
    <div><h1>我的课表</h1><div class="sub">星光钢琴机构</div></div>
  </div>
  <div class="body">
    <div class="remaining-banner">
      <div class="remaining-num">8</div>
      <div class="remaining-label">剩余课时 · 到期 2024-12-31</div>
    </div>
    <div class="card">
      <div class="card-title">即将上课</div>
      <div class="lesson-item">
        <div class="dot"></div>
        <div>
          <div class="lesson-name">钢琴基础班</div>
          <div class="lesson-meta">周四 18:00–18:45 · 王老师</div>
        </div>
        <div class="badge badge-scheduled">明天</div>
      </div>
      <div class="lesson-item">
        <div class="dot"></div>
        <div>
          <div class="lesson-name">陪练课</div>
          <div class="lesson-meta">周五 15:00–15:45 · 王老师</div>
        </div>
        <div class="badge badge-scheduled">后天</div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">上课历史</div>
      <div class="lesson-item">
        <div class="dot done"></div>
        <div><div class="lesson-name">钢琴基础班</div><div class="lesson-meta">2024-04-04 18:00</div></div>
        <div class="badge badge-done">完成</div>
      </div>
      <div class="lesson-item">
        <div class="dot done"></div>
        <div><div class="lesson-name">钢琴基础班</div><div class="lesson-meta">2024-03-28 18:00</div></div>
        <div class="badge badge-done">完成</div>
      </div>
    </div>
  </div>
  <div class="tabbar">
    <div class="tab"><div class="icon active"></div><div class="lbl active">课表</div></div>
    <div class="tab"><div class="icon"></div><div class="lbl">课时</div></div>
    <div class="tab"><div class="icon"></div><div class="lbl">预约</div></div>
    <div class="tab"><div class="icon"></div><div class="lbl">通知</div></div>
    <div class="tab"><div class="icon"></div><div class="lbl">我的</div></div>
  </div>
</div>
<div class="phone-label">学员端 · 课表</div>
</div>
</body>
</html>
