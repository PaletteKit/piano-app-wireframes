<!DOCTYPE html>
<html lang="zh">
<head><meta charset="UTF-8"><title>学员端 - 课时</title><link rel="stylesheet" href="style.css"></head>
<body>
<div>
<div class="phone">
  <div class="header"><h1>课时</h1></div>
  <div class="body">
    <div class="remaining-banner">
      <div class="remaining-num">8</div>
      <div class="remaining-label">钢琴基础班剩余课时</div>
    </div>
    <div class="card">
      <div class="card-title">课时包详情</div>
      <div class="pkg-item">
        <div>
          <div class="pkg-name">钢琴基础班课时包</div>
          <div class="pkg-meta">购入：2024-01-10 · 到期：2024-12-31</div>
        </div>
        <div style="text-align:right;">
          <div class="pkg-remain">8</div>
          <div class="pkg-total">/ 20 课时</div>
        </div>
      </div>
      <div class="pkg-item">
        <div>
          <div class="pkg-name">陪练课课时包</div>
          <div class="pkg-meta">购入：2024-02-01 · 到期：2024-12-31</div>
        </div>
        <div style="text-align:right;">
          <div class="pkg-remain">3</div>
          <div class="pkg-total">/ 10 课时</div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">扣课时记录</div>
      <div class="lesson-item">
        <div class="dot done"></div>
        <div><div class="lesson-name">钢琴基础班</div><div class="lesson-meta">2024-04-04 · 已签到</div></div>
        <div style="color:#FF4D4F;font-size:13px;font-weight:bold;margin-left:auto;">-1</div>
      </div>
      <div class="lesson-item">
        <div class="dot done"></div>
        <div><div class="lesson-name">陪练课</div><div class="lesson-meta">2024-04-03 · 已签到</div></div>
        <div style="color:#FF4D4F;font-size:13px;font-weight:bold;margin-left:auto;">-1</div>
      </div>
      <div class="lesson-item">
        <div class="dot done"></div>
        <div><div class="lesson-name">钢琴基础班</div><div class="lesson-meta">2024-03-28 · 已签到</div></div>
        <div style="color:#FF4D4F;font-size:13px;font-weight:bold;margin-left:auto;">-1</div>
      </div>
    </div>
  </div>
  <div class="tabbar">
    <div class="tab"><div class="icon"></div><div class="lbl">课表</div></div>
    <div class="tab"><div class="icon active"></div><div class="lbl active">课时</div></div>
    <div class="tab"><div class="icon"></div><div class="lbl">预约</div></div>
    <div class="tab"><div class="icon"></div><div class="lbl">通知</div></div>
    <div class="tab"><div class="icon"></div><div class="lbl">我的</div></div>
  </div>
</div>
<div class="phone-label">学员端 · 课时</div>
</div>
</body>
</html>
